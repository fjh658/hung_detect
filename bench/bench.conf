# hung_bench hook configuration
# One function name per line. Lines starting with # are comments.
#
# C symbols are resolved via dlsym; Swift functions are matched by
# scanning the symbol table and demangling. The binary must not be
# stripped for Swift hooks to work.

# ---- C system calls (typed hooks) ----
IOPMCopyAssertionsByProcess
CGWindowListCopyWindowInfo
sysctl
proc_pidpath
sandbox_check
SecStaticCodeCreateWithPath
SecCodeCopySigningInformation
SecCertificateCopySubjectSummary

# ---- Swift functions (generic trampolines, auto-matched) ----
sleepPreventingPIDs
concurrentMap
codeSigningAuthority
sha256OfFile
kernelInfo
